<!doctype html>
<html>
<meta charset="utf-8">
<head>
  <title>Ejendomsopslag</title>
  <link href="style.css" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>
<body>

  <h1>Ejendomsopslag</h1>

  <label for="adresse">Adresse:</label>
  <div class="autocomplete-container">
    <input type="text" id="adresse">
  </div>

  <p>Valgt adresse: <span id="valgtadresse"></span></p>

  <button id="bbr-knap">Hent ejendomsdata</button>

  <div id="ejendomsprofil" style="display:none">
    <h2>Ejendomsprofil</h2>
    <p><strong>Adresse:</strong> <span id="profil-adresse"></span></p>
    <p><strong>Ejendomstype:</strong> <span id="profil-ejendomstype"></span></p>
    <p><strong>Byggeår:</strong> <span id="profil-byggeaar"></span></p>
    <p><strong>Boligareal:</strong> <span id="profil-boligareal"></span> m²</p>
    <p><strong>Antal værelser:</strong> <span id="profil-vaerelser"></span></p>
  </div>

  <div id="case-formular" style="display:none">
    <h3>Opret investeringscase</h3>
    <label>Navn:<br>
      <input type="text" id="case-navn" placeholder="fx Køb af Nørrebro-lejlighed">
    </label><br>
    <label>Beskrivelse:<br>
      <textarea id="case-beskrivelse" placeholder="Beskriv investeringen..."></textarea>
    </label><br>
    <button id="opret-case-knap">Opret case</button>
    <p id="case-besked"></p>
  </div>

  <button id="kort-knap">Vis kort</button>

  <h3>Kort</h3>
  <div id="map"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/core-js/2.4.1/core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fetch/2.0.3/fetch.min.js"></script>
  <script src="/dawa/dawa-autocomplete2.min.js"></script>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="/script.js"></script>

</body>
</html>
