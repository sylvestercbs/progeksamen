<!doctype html>
<html>
<meta charset="utf-8">
<head>
  <title>Ejendomsprofiler</title>
  <link href="style.css" rel="stylesheet">
</head>
<body>

<header>
  <span class="logo">Ejendomsopslag</span>
  <nav>
    <a href="/">Forside</a>
    <a href="/ejendomme" class="aktiv-nav">Mine Ejendomme</a>
  </nav>
</header>

<section class="side-hero">
  <h1>Mine Ejendomme</h1>
  <p>Oversigt over alle dine gemte ejendomsprofiler og investeringscases</p>
  <a href="/" class="sekundær-knap sekundær-knap--lys">+ Tilføj ny ejendom</a>
</section>

<div class="indhold">

  <div id="ejendomme-liste">Indlæser...</div>

  <div id="rediger-form" class="card rediger-kort" style="display:none">
    <h3>Rediger ejendom</h3>
    <input type="hidden" id="rediger-id">
    <div class="form-grid">
      <label>Vejnavn<br><input type="text" id="rediger-vejnavn"></label>
      <label>Husnummer<br><input type="text" id="rediger-husnummer"></label>
      <label>Postnummer<br><input type="text" id="rediger-postnummer"></label>
      <label>Bynavn<br><input type="text" id="rediger-bynavn"></label>
      <label>Ejendomstype<br><input type="text" id="rediger-ejendomstype"></label>
      <label>Byggeår<br><input type="number" id="rediger-byggeaar"></label>
      <label>Boligareal (m²)<br><input type="number" id="rediger-boligareal"></label>
      <label>Antal værelser<br><input type="number" id="rediger-vaerelser"></label>
    </div>
    <div class="knap-række">
      <button id="gem-rediger-knap" class="primær-knap primær-knap--smal">Gem ændringer</button>
      <button id="annuller-rediger-knap" class="sekundær-knap sekundær-knap--smal">Annuller</button>
    </div>
  </div>

  <div id="cases-sektion" style="display:none">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
      <h3 id="cases-overskrift" style="margin:0"></h3>
      <div style="display:flex; gap:8px;">
        <button id="sammenlign-knap" class="tabel-knap" style="display:none" onclick="sammenlignCases()">Sammenlign (2)</button>
        <button class="tabel-knap" onclick="gaaTilNyCase()">+ Ny case</button>
      </div>
    </div>
    <div id="cases-liste"></div>
  </div>

  <div id="sammenlign-sektion" style="display:none">
    <h3>Sammenligning af cases</h3>
    <div id="sammenlign-indhold"></div>
    <button class="tabel-knap" onclick="document.getElementById('sammenlign-sektion').style.display='none'" style="margin-top:12px;">Luk</button>
  </div>

  <div id="sim-sektion" style="display:none">
    <div class="card">
      <h3>Simulering: <span id="sim-casenavn"></span></h3>
      <label>Lånebeløb (kr.)<br><input type="number" id="sim-laanebeloeb"></label><br>
      <label>Rentesats (fx 0.0425)<br><input type="number" id="sim-rentesats" step="0.001"></label><br>
      <label>Løbetid (år)<br><input type="number" id="sim-loebetid"></label><br>
      <label>Årlig lejeindtægt (kr.)<br><input type="number" id="sim-lejeindtaegt" value="0"></label><br>
      <label>Årlige udgifter (kr.)<br><input type="number" id="sim-udgifter" value="0"></label><br>
      <label>Antal år<br><input type="number" id="sim-antal-aar" value="30" min="1" max="50"></label><br>
      <button id="sim-knap" class="primær-knap">Kør simulering</button>
    </div>
  </div>

  <div id="sim-resultat" style="display:none">
    <h3>Simuleringsresultat</h3>
    <canvas id="sim-graf"></canvas>
    <div id="sim-tabel"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="simulering.js"></script>
<script src="ejendomme.js"></script>
</body>
</html>
